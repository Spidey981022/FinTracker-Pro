<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fin Tracker | Register</title>
    <link rel="stylesheet" href="..\Assets\style.css" />
    <link rel="icon" type="image/x-icon" href="../Assets/Images/favicon.png" />
</head>
<body>
<main>
    <form id="signup-form">
        <h1>Create Account</h1>
        <p style = "margin-top: 10px">Join FinTrack Pro</p>
        <div class="input-labels">
            <div><p>Fullname</p>
                <label for="fullname"></label>
                <input id="fullname" required type="text" /></div>
            <div><p>Email</p>
                <label for="email"></label>
                <input id="email" required type="email" /></div>
            <div><p>Username</p>
                <label for="username"></label>
                <input id="username" required type="text" /></div>
            <div><p>Password</p>
                <label for="password"></label>
                <input id="password" required type="password" /></div>
            <button id="register">Register</button>
        </div>
        <p>Already have an account? <a href="index.html">Login here</a></p>
    </form>
</main>
<script type="module" src="../Assets/signup.js"></script>
</body>
</html>

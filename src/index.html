<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fin Tracker | Login</title>
    <link rel="stylesheet" href="Assets/style.css" />
    <link rel="icon" type="image/x-icon" href="Assets/Images/favicon.png" />
</head>
<body>
<main>
    <form id="login-form">
        <h1>WELCOME</h1>
        <p style = "margin-top: 10px">Login to FinTrack Pro</p>
        <div class="input-labels">
            <div><p>Username</p>
                <label for="username"></label>
                <input id="username" required type="text" /></div>
            <div><p>Password</p>
                <label for="password"></label>
                <input id="password" required type="password" /></div>
            <button id="login">Login</button>
        </div>
        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </form>
</main>
<script type="module" src="Assets/loginUser.js"></script>
</body>
</html>
